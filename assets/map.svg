  <style>
    .pulse-ring {
      transform-box: fill-box;
      transform-origin: center;
      animation: pulse 2.4s ease-out infinite;
      opacity: 0.8;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.7);
        opacity: 0.7;
      }
      70% {
        transform: scale(3);
        opacity: 0;
      }
      100% {
